services:
  db:
    image: postgres:16-alpine
    container_name: rv2class_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rv2class
      POSTGRES_USER: rv2class
      POSTGRES_PASSWORD: rv2class_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rv2class"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
